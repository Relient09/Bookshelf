services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookshelf
      POSTGRES_PASSWORD: bookshelf
      POSTGRES_DB: bookshelf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookshelf"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:latest
    restart: unless-stopped
    pull_policy: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://bookshelf:bookshelf@db:5432/bookshelf
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
