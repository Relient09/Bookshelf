<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookshelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parchment: #f5f0e8;
    --cream: #faf7f2;
    --gold: #c8973a;
    --gold-light: #e8c97a;
    --rust: #8b3a2a;
    --sage: #5a6e4e;
    --muted: #8a7e6e;
    --border: #d9d0be;
    --shadow: rgba(26,18,8,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* — Header — */
  header {
    background: var(--ink);
    color: var(--parchment);
    padding: 2rem 3rem;
    display: flex;
    align-items: flex-end;
    gap: 2rem;
    border-bottom: 3px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    letter-spacing: 0.02em;
    line-height: 1;
    flex-shrink: 0;
  }
  header h1 span { color: var(--gold); }

  .header-search {
    flex: 1;
    display: flex;
    gap: 0.5rem;
    max-width: 480px;
    margin-left: auto;
  }
  .header-search input {
    flex: 1;
    background: rgba(245,240,232,0.08);
    border: 1px solid rgba(245,240,232,0.2);
    color: var(--parchment);
    padding: 0.55rem 1rem;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
  }
  .header-search input::placeholder { color: rgba(245,240,232,0.4); }
  .header-search input:focus { outline: none; border-color: var(--gold); }
  .header-search button {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 0.55rem 1.1rem;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    font-size: 0.875rem;
    transition: background 0.2s;
  }
  .header-search button:hover { background: var(--gold-light); }

  /* — Layout — */
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    min-height: calc(100vh - 89px);
  }

  /* — Sidebar / Add Panel — */
  .sidebar {
    background: var(--parchment);
    border-right: 1px solid var(--border);
    padding: 2rem;
    overflow-y: auto;
  }
  .sidebar h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    margin-bottom: 1.25rem;
    color: var(--ink);
  }

  .tab-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }
  .tab-btn {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid var(--border);
    background: white;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }
  .tab-btn.active {
    background: var(--ink);
    color: var(--parchment);
    border-color: var(--ink);
  }

  .lookup-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .lookup-row input {
    flex: 1;
    padding: 0.6rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    background: white;
    color: var(--ink);
  }
  .lookup-row input:focus { outline: none; border-color: var(--gold); }
  .lookup-row button {
    padding: 0.6rem 1rem;
    background: var(--ink);
    color: var(--parchment);
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    font-size: 0.8rem;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .lookup-row button:hover { opacity: 0.85; }

  /* Search results picker */
  .search-results {
    display: none;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
    max-height: 220px;
    overflow-y: auto;
  }
  .search-results.visible { display: flex; }
  .result-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .result-item:hover { border-color: var(--gold); }
  .result-item img { width: 32px; height: 46px; object-fit: cover; border-radius: 2px; flex-shrink: 0; background: var(--border); }
  .result-item .ri-info { flex: 1; min-width: 0; }
  .result-item .ri-title { font-weight: 500; font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-item .ri-author { font-size: 0.75rem; color: var(--muted); }

  /* Book form */
  .book-form { display: flex; flex-direction: column; gap: 0.75rem; }
  .form-row { display: flex; flex-direction: column; gap: 0.3rem; }
  .form-row label { font-size: 0.75rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .form-row input,
  .form-row textarea {
    padding: 0.6rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    background: white;
    color: var(--ink);
    resize: vertical;
  }
  .form-row input:focus,
  .form-row textarea:focus { outline: none; border-color: var(--gold); }

  .form-cover-preview {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    margin-bottom: 0.5rem;
  }
  .form-cover-preview img {
    width: 64px;
    height: 90px;
    object-fit: cover;
    border-radius: 3px;
    border: 1px solid var(--border);
    display: none;
  }
  .form-cover-preview img.visible { display: block; }

  .btn-add {
    margin-top: 0.5rem;
    padding: 0.75rem;
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-add:hover { background: var(--gold-light); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

  .status-msg {
    font-size: 0.8rem;
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    display: none;
  }
  .status-msg.success { background: #e8f5e9; color: var(--sage); display: block; }
  .status-msg.error   { background: #fdecea; color: var(--rust); display: block; }

  /* — Main / Collection — */
  .main {
    padding: 2rem 2.5rem;
    overflow-y: auto;
  }
  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.75rem;
  }
  .main-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
  }
  .main-header h2 span { color: var(--muted); font-size: 1rem; font-family: 'DM Sans', sans-serif; font-weight: 300; margin-left: 0.5rem; }

  .btn-export {
    padding: 0.5rem 1rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .btn-export:hover { border-color: var(--ink); color: var(--ink); }

  /* Grid */
  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.5rem;
  }

  .book-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .book-card:hover { box-shadow: 0 8px 24px var(--shadow); transform: translateY(-2px); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .book-cover {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    background: var(--parchment);
    display: block;
  }
  .book-cover-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: linear-gradient(135deg, var(--parchment) 0%, var(--border) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }

  .book-info {
    padding: 0.9rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.92rem;
    line-height: 1.3;
    font-weight: 700;
  }
  .book-author {
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
  }
  .book-meta {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }
  .book-actions {
    padding: 0 0.9rem 0.9rem;
    display: flex;
    gap: 0.5rem;
  }
  .btn-details {
    flex: 1;
    padding: 0.4rem 0.5rem;
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.74rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-details:hover { background: var(--border); }
  .btn-delete {
    padding: 0.4rem 0.6rem;
    background: transparent;
    border: 1px solid #f5c6c0;
    border-radius: 3px;
    font-size: 0.74rem;
    cursor: pointer;
    color: var(--rust);
    transition: background 0.15s;
  }
  .btn-delete:hover { background: #fdecea; }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 1rem; }
  .empty-state small { font-size: 0.82rem; }

  /* — Modal — */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.55);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--cream);
    border-radius: 8px;
    max-width: 560px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(26,18,8,0.3);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-inner {
    display: flex;
    gap: 1.5rem;
    padding: 2rem;
  }
  .modal-cover { width: 110px; flex-shrink: 0; }
  .modal-cover img { width: 100%; border-radius: 4px; box-shadow: 0 4px 16px var(--shadow); }
  .modal-cover-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--parchment);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }
  .modal-body { flex: 1; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; line-height: 1.3; margin-bottom: 0.25rem; }
  .modal-author { color: var(--muted); font-style: italic; margin-bottom: 1rem; font-size: 0.9rem; }
  .modal-meta { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
  .modal-meta-row { font-size: 0.8rem; }
  .modal-meta-row strong { color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.7rem; display: block; }
  .modal-desc { font-size: 0.85rem; line-height: 1.65; color: #3a3020; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.5rem; }
  .modal-close {
    position: sticky;
    top: 0;
    float: right;
    margin: 1rem 1rem 0 0;
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* Loader */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .spinner.visible { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    header { padding: 1rem 1.25rem; flex-wrap: wrap; gap: 0.75rem; }
    .main { padding: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>My <span>Bookshelf</span></h1>
  <div class="header-search">
    <input type="text" id="filterInput" placeholder="Filter collection…" oninput="filterBooks(this.value)">
    <button onclick="filterBooks(document.getElementById('filterInput').value)">Filter</button>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Add a Book</h2>

    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('isbn')">By ISBN</button>
      <button class="tab-btn" onclick="setTab('title')">By Title</button>
    </div>

    <!-- ISBN lookup -->
    <div id="tab-isbn">
      <div class="lookup-row">
        <input type="text" id="isbnInput" placeholder="Enter ISBN…" onkeydown="if(event.key==='Enter') lookupISBN()">
        <button onclick="lookupISBN()">Look up</button>
        <div class="spinner" id="isbnSpinner"></div>
      </div>
    </div>

    <!-- Title lookup -->
    <div id="tab-title" style="display:none">
      <div class="lookup-row">
        <input type="text" id="titleSearchInput" placeholder="Search by title…" onkeydown="if(event.key==='Enter') lookupTitle()">
        <button onclick="lookupTitle()">Search</button>
        <div class="spinner" id="titleSpinner"></div>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <!-- Book Form -->
    <div class="book-form" id="bookForm" style="display:none">
      <div class="form-cover-preview">
        <img id="coverPreview" src="" alt="Cover">
        <div style="flex:1">
          <div class="form-row">
            <label>Cover URL</label>
            <input type="text" id="fCoverUrl" placeholder="https://…" oninput="updateCoverPreview(this.value)">
          </div>
        </div>
      </div>
      <div class="form-row">
        <label>Title *</label>
        <input type="text" id="fTitle" placeholder="Book title">
      </div>
      <div class="form-row">
        <label>Author</label>
        <input type="text" id="fAuthor" placeholder="Author name(s)">
      </div>
      <div class="form-row">
        <label>ISBN</label>
        <input type="text" id="fIsbn" placeholder="ISBN-10 or ISBN-13">
      </div>
      <div class="form-row">
        <label>Publisher</label>
        <input type="text" id="fPublisher" placeholder="Publisher name">
      </div>
      <div class="form-row">
        <label>Publish Date</label>
        <input type="text" id="fPublishDate" placeholder="e.g. 2021">
      </div>
      <div class="form-row">
        <label>Description</label>
        <textarea id="fDescription" rows="4" placeholder="Book description…"></textarea>
      </div>
      <button class="btn-add" id="addBtn" onclick="addBook()">Add to Bookshelf</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-header">
      <h2>Collection <span id="bookCount"></span></h2>
      <button class="btn-export" onclick="exportCSV()">
        ↓ Export CSV
      </button>
    </div>
    <div class="book-grid" id="bookGrid">
      <div class="empty-state">
        <div class="icon">📚</div>
        <p>Your bookshelf is empty.</p>
        <small>Add your first book using the panel on the left.</small>
      </div>
    </div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-inner">
      <div class="modal-cover" id="modalCover"></div>
      <div class="modal-body">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-author" id="modalAuthor"></div>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-desc" id="modalDesc"></div>
      </div>
    </div>
  </div>
</div>

<script>
let activeTab = 'isbn';
let allBooks  = [];

// --- Tab ---
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='isbn')||(i===1&&tab==='title')));
  document.getElementById('tab-isbn').style.display  = tab === 'isbn'  ? '' : 'none';
  document.getElementById('tab-title').style.display = tab === 'title' ? '' : 'none';
  clearForm();
}

// --- Status ---
function showStatus(msg, type='success') {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
  setTimeout(() => el.className = 'status-msg', 3500);
}

// --- Cover preview ---
function updateCoverPreview(url) {
  const img = document.getElementById('coverPreview');
  img.src = url;
  img.classList.toggle('visible', !!url);
}

// --- Populate form ---
function populateForm(data) {
  document.getElementById('fTitle').value       = data.title || '';
  document.getElementById('fAuthor').value      = data.author || '';
  document.getElementById('fIsbn').value        = data.isbn || '';
  document.getElementById('fPublisher').value   = data.publisher || '';
  document.getElementById('fPublishDate').value = data.publish_date || '';
  document.getElementById('fDescription').value = data.description || '';
  document.getElementById('fCoverUrl').value    = data.cover_url || '';
  updateCoverPreview(data.cover_url || '');
  document.getElementById('bookForm').style.display = 'flex';
}

function clearForm() {
  ['fTitle','fAuthor','fIsbn','fPublisher','fPublishDate','fDescription','fCoverUrl'].forEach(id => document.getElementById(id).value='');
  updateCoverPreview('');
  document.getElementById('bookForm').style.display = 'none';
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('searchResults').innerHTML = '';
}

// --- ISBN Lookup ---
async function lookupISBN() {
  const isbn = document.getElementById('isbnInput').value.trim();
  if (!isbn) return;
  const spinner = document.getElementById('isbnSpinner');
  spinner.classList.add('visible');
  clearForm();
  try {
    const r = await fetch(`/api/lookup/isbn?isbn=${encodeURIComponent(isbn)}`);
    const data = await r.json();
    if (!r.ok) { showStatus(data.error || 'Not found', 'error'); return; }
    populateForm(data);
  } catch(e) {
    showStatus('Network error', 'error');
  } finally {
    spinner.classList.remove('visible');
  }
}

// --- Title Search ---
async function lookupTitle() {
  const title = document.getElementById('titleSearchInput').value.trim();
  if (!title) return;
  const spinner = document.getElementById('titleSpinner');
  spinner.classList.add('visible');
  clearForm();
  try {
    const r = await fetch(`/api/lookup/title?title=${encodeURIComponent(title)}`);
    const data = await r.json();
    if (!r.ok) { showStatus(data.error || 'Not found', 'error'); return; }
    renderSearchResults(data);
  } catch(e) {
    showStatus('Network error', 'error');
  } finally {
    spinner.classList.remove('visible');
  }
}

function renderSearchResults(results) {
  const container = document.getElementById('searchResults');
  container.innerHTML = '';
  results.forEach(b => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <img src="${b.cover_url || ''}" alt="" onerror="this.style.display='none'">
      <div class="ri-info">
        <div class="ri-title">${b.title}</div>
        <div class="ri-author">${b.author || 'Unknown author'} · ${b.publish_date || ''}</div>
      </div>`;
    div.onclick = () => { populateForm(b); container.classList.remove('visible'); };
    container.appendChild(div);
  });
  container.classList.add('visible');
}

// --- Add Book ---
async function addBook() {
  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  btn.textContent = 'Adding…';
  const payload = {
    title:        document.getElementById('fTitle').value.trim(),
    author:       document.getElementById('fAuthor').value.trim(),
    isbn:         document.getElementById('fIsbn').value.trim(),
    publisher:    document.getElementById('fPublisher').value.trim(),
    publish_date: document.getElementById('fPublishDate').value.trim(),
    description:  document.getElementById('fDescription').value.trim(),
    cover_url:    document.getElementById('fCoverUrl').value.trim(),
  };
  if (!payload.title) { showStatus('Title is required', 'error'); btn.disabled=false; btn.textContent='Add to Bookshelf'; return; }
  try {
    const r = await fetch('/api/books', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await r.json();
    if (!r.ok) { showStatus(data.error || 'Error adding book', 'error'); return; }
    showStatus(`"${data.title}" added!`, 'success');
    clearForm();
    document.getElementById('isbnInput').value = '';
    document.getElementById('titleSearchInput').value = '';
    loadBooks();
  } catch(e) {
    showStatus('Network error', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add to Bookshelf';
  }
}

// --- Delete ---
async function deleteBook(id, title) {
  if (!confirm(`Remove "${title}" from your bookshelf?`)) return;
  await fetch(`/api/books/${id}`, {method:'DELETE'});
  loadBooks();
}

// --- Load & Render ---
async function loadBooks(q='') {
  const url = q ? `/api/books?q=${encodeURIComponent(q)}` : '/api/books';
  const r = await fetch(url);
  allBooks = await r.json();
  renderBooks(allBooks);
}

function renderBooks(books) {
  const grid = document.getElementById('bookGrid');
  document.getElementById('bookCount').textContent = books.length ? `(${books.length})` : '';
  if (!books.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">📚</div><p>No books found.</p><small>Try a different filter or add some books.</small></div>`;
    return;
  }
  grid.innerHTML = books.map((b,i) => `
    <div class="book-card" style="animation-delay:${i*0.04}s">
      ${b.cover_url
        ? `<img class="book-cover" src="${b.cover_url}" alt="${b.title}" loading="lazy" onerror="this.outerHTML='<div class=book-cover-placeholder>📖</div>'">`
        : `<div class="book-cover-placeholder">📖</div>`}
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author || 'Unknown author'}</div>
        ${b.publish_date ? `<div class="book-meta">${b.publish_date}</div>` : ''}
      </div>
      <div class="book-actions">
        <button class="btn-details" onclick='openModal(${JSON.stringify(b)})'>Details</button>
        <button class="btn-delete" onclick="deleteBook(${b.id}, '${b.title.replace(/'/g,"\\'")}')">✕</button>
      </div>
    </div>`).join('');
}

// --- Filter ---
let filterTimer;
function filterBooks(q) {
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => loadBooks(q), 300);
}

// --- Modal ---
function openModal(b) {
  document.getElementById('modalTitle').textContent  = b.title;
  document.getElementById('modalAuthor').textContent = b.author || 'Unknown author';
  document.getElementById('modalCover').innerHTML = b.cover_url
    ? `<img src="${b.cover_url}" alt="${b.title}" onerror="this.outerHTML='<div class=modal-cover-placeholder>📖</div>'">`
    : `<div class="modal-cover-placeholder">📖</div>`;
  const meta = [
    b.publisher    ? `<div class="modal-meta-row"><strong>Publisher</strong>${b.publisher}</div>` : '',
    b.publish_date ? `<div class="modal-meta-row"><strong>Published</strong>${b.publish_date}</div>` : '',
    b.isbn         ? `<div class="modal-meta-row"><strong>ISBN</strong>${b.isbn}</div>` : '',
  ].join('');
  document.getElementById('modalMeta').innerHTML = meta;
  document.getElementById('modalDesc').textContent = b.description || '';
  document.getElementById('modalDesc').style.display = b.description ? '' : 'none';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// --- Export ---
function exportCSV() {
  window.location.href = '/api/books/export';
}

// --- Init ---
loadBooks();
</script>
